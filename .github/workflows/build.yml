name: Build UXC Packages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  OPENWRT_SDK_URL: https://downloads.openwrt.org/releases/25.12.1/targets/armsr/armv8/openwrt-sdk-25.12.1-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman squashfs-tools fakeroot jq zstd

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: openwrt-sdk-25.12.1-armsr-armv8-gcc14

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -L "$OPENWRT_SDK_URL" -o /tmp/sdk.tar.zst
          mkdir -p sdk
          tar --zstd -xf /tmp/sdk.tar.zst -C sdk --strip-components=1
          rm /tmp/sdk.tar.zst

      - name: Install signing key
        run: |
          echo "${{ secrets.APK_SIGNING_KEY }}" > sdk/private-key.pem
          chmod 600 sdk/private-key.pem

      - name: Build all container packages
        run: ./build.sh
        env:
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libfakeroot

      - name: Generate APK feed
        run: ./index.sh

      - name: Upload feed artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/feed

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
